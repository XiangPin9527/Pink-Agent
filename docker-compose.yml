version: '3.8'

services:
  ai-agent-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-engine
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_agent
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
    volumes:
      - ./app:/app/app
    depends_on:
      - postgres
      - redis
    networks:
      - ai-agent-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-agent-network

  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  ai-agent-network:
    driver: bridge
